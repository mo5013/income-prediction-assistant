project:
  name: income_prediction_assistant
  random_state: 42

data:
  raw_train_path: data/raw/adult.data
  raw_test_path: data/raw/adult.test
  processed_train_path: data/processed/train_processed.csv
  processed_test_path: data/processed/test_processed.csv
  target_column: income

model:
  output_path: models/best_model.joblib
  metric_to_optimize: f1

mlflow:
  experiment_name: adult_income_prediction

features:
  numeric:
    - age
    - fnlwgt
    - education_num
    - capital_gain
    - capital_loss
    - hours_per_week

  categorical:
    - workclass
    - education
    - marital_status
    - occupation
    - relationship
    - race
    - sex
    - native_country